# Local full stack: Chatwoot (web + worker) + Evolution API + the brain.
# Chatwoot and Evolution REUSE your existing Postgres/Redis — no bundled DBs here.
# All connection settings come from .env (CHATWOOT_POSTGRES_*, CHATWOOT_REDIS_URL,
# EVOLUTION_DATABASE_CONNECTION_URI, EVOLUTION_CACHE_REDIS_URI). Containers reach a
# host-published PG/Redis via host.docker.internal (mapped to the docker host
# gateway by extra_hosts). The brain uses its own SQLite — no PG/Redis.
#
# The apps share one Docker network, so Chatwoot reaches the brain's webhook at
# http://brain:8080 and Evolution reaches Chatwoot at http://chatwoot:3000.
#
# See RUNBOOK.md for the step-by-step (external-DB setup, first-boot db:chatwoot_prepare,
# wiring order). Pin the chatwoot/evolution image tags to real releases before relying on this.

services:
  # ── Chatwoot (the hub) — reuses your EXISTING Postgres/Redis (see .env) ───────
  chatwoot: # Rails web
    image: chatwoot/chatwoot:latest # PIN a real tag (e.g. v4.x) before relying on this
    # The existing native Postgres listens on 127.0.0.1 only, so share the host
    # network namespace to reach it (and kaspim-redis). Binds host :3000 directly.
    network_mode: host
    environment: &chatwoot_env
      INSTALLATION_ENV: docker
      RAILS_ENV: production
      NODE_ENV: production
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env via openssl rand -hex 64}"
      FRONTEND_URL: http://localhost:3000
      ENABLE_ACCOUNT_SIGNUP: "true" # lets you create the first account on first boot
      # Allow webhook/channel deliveries to localhost/private IPs (brain :8080,
      # Evolution :9700). Without this Chatwoot's ssrf_filter rejects them with
      # "Hostname 'localhost' has no public ip addresses".
      SAFE_FETCH_ALLOW_PRIVATE_NETWORK: "true"
      # Connection to the existing Postgres/Redis — all from .env (no bundled DBs).
      POSTGRES_HOST: ${CHATWOOT_POSTGRES_HOST:?set CHATWOOT_POSTGRES_HOST in .env}
      POSTGRES_PORT: ${CHATWOOT_POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${CHATWOOT_POSTGRES_USERNAME:?set CHATWOOT_POSTGRES_USERNAME in .env}
      POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:?set CHATWOOT_POSTGRES_PASSWORD in .env}
      POSTGRES_DATABASE: ${CHATWOOT_POSTGRES_DATABASE:-chatwoot}
      REDIS_URL: ${CHATWOOT_REDIS_URL:?set CHATWOOT_REDIS_URL in .env}
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    restart: unless-stopped

  chatwoot-sidekiq: # background worker — fires the account webhook to the brain
    image: chatwoot/chatwoot:latest # keep in lockstep with the chatwoot tag
    network_mode: host
    environment: *chatwoot_env
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    restart: unless-stopped

  # ── Evolution API (WhatsApp gateway) — reuses the EXISTING Postgres/Redis ─────
  # NOTE: production WhatsApp runs on the REMOTE Evolution (45.136.56.148). This
  # local service is optional/dev. To run it against the native loopback Postgres,
  # switch it to `network_mode: host` like chatwoot — and give it a port other than
  # 8080 (the brain uses 8080) to avoid a clash.
  evolution:
    image: atendai/evolution-api:latest # PIN a real tag (e.g. v2.x) before relying on this
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      AUTHENTICATION_API_KEY: "${AUTHENTICATION_API_KEY:?set AUTHENTICATION_API_KEY in .env via openssl rand -hex 16}"
      SERVER_URL: http://localhost:8081
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_CONNECTION_URI:?set EVOLUTION_DATABASE_CONNECTION_URI in .env}
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: ${EVOLUTION_CACHE_REDIS_URI:?set EVOLUTION_CACHE_REDIS_URI in .env}
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
    volumes: [evo_instances:/evolution/instances]
    ports: ["8081:8080"]
    restart: unless-stopped

  # ── Brain = xpayment-crm (webhook + admin + SQLite) ─────────────────────────
  brain:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on: [chatwoot]
    # Host networking to match chatwoot: brain reaches Chatwoot at localhost:3000
    # and Chatwoot reaches the brain webhook at localhost:8080. Binds host :8080.
    network_mode: host
    env_file: [.env] # the brain catalog (LLM_*, CHATWOOT_*, ADMIN_*, …)
    environment:
      DB_PATH: /app/data/brain.db
      MEDIA_DIR: /app/media
    volumes:
      - brain_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    stop_grace_period: 25s

volumes:
  evo_instances: # Evolution WhatsApp session state
  brain_data:    # the brain's SQLite + media
