{{define "title"}}Audit{{end}}
{{define "content"}}
<h1>Audit log</h1>
<table>
  <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Detail</th></tr></thead>
  <tbody>
  {{range .Audit}}
    <tr><td>{{.At}}</td><td>{{.Actor}}</td><td>{{.Action}}</td><td>{{.Detail}}</td></tr>
  {{end}}
  </tbody>
</table>
{{end}}
